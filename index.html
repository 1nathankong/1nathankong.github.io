<!DOCTYPE html>
<html>

<head>
    <title>Kong</title>

    <!-- Style Section -->
    <style>
    body {
        background-color: lightblue;
        font-family: Arial;
        text-align:center;
        margin: 0;
    }
    h1{
        color: #000;
        font-size: 30 px;
    }

    ul {
            list-style-type:square;
            padding-left:20px;
            display: inline-block;
            text-align: left;
        }

    li {
        font-size: 18px;
        margin-bottom:10px
    }
    
    #main {
        display: none;
    }

    #intro {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: rgba(0, 0, 0, 0.5);
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
    }

    
    </style>
</head>

<!-- Intro Page-->
<div id = "intro">
    <button id="start">Click to Start</button>
</div>

<!-- Main Site -->
<div id = "main">
    <h1>Nathan Kong</h1>
    <p> Builder with an interest in Autonomous Systems and Hardware-Software Codesign.</p>
    <img src="myself.png" alt="Personal Image" style="width:400px;">
</div>

<!-- Audio Section -->
<audio id = "bgmusic" loop>
    <source src = "song1.mp3" type = "audio/mp3">
</audio>

<!-- Script to implement music -->
<script>
    document.addEventListener("click", function() {
        document.getElementById("bgmusic").play();
        document.getElementById("intro").style.display = "none";
        document.getElementById("main").style.display = "block";
    });                                                                                                                                       
</script>
</div>
</html>
