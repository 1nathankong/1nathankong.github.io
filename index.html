<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Kong</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: #2B445B; font-family: Arial, sans-serif; text-align: center; margin: 0; color: white; }
        h1 { font-size: 48px; margin-bottom: 10px; letter-spacing: 1px; }
        a { color: white; text-decoration: none; }
        #main { display: none; }
        #intro { height: 100vh; display: flex; justify-content: center; align-items: center; }
        button { padding: 15px 32px; font-size: 18px; border: none; border-radius: 10px; background: #2B445B; color: white; cursor: pointer; transition: .2s; }
        .fab, .fas { font-size: 50px; }
    </style>
</head>
<body>
    <div id="intro"><button id="start">Click to Start and Turn up Volume</button></div>
    <main id="main">
        <h1>Nathan Kong</h1>
        <p>Builder with an interest in Autonomous Systems and Hardware-Software Codesign.</p>
        <img src="myself.png" alt="Nathan Kong" style="width:400px;">
        <h3>Links</h3>
        <p>
            <a href="https://linkedin.com/in/nathankong999" target="_blank" rel="noopener"><i class="fab fa-linkedin"></i></a>
            <a href="https://github.com/1nathankong" target="_blank" rel="noopener"><i class="fab fa-github"></i></a>
            <a href="nathankong2026v1.pdf" target="_blank" rel="noopener"><i class="fas fa-file"></i></a>
        </p>
    </main>
    <audio id="bgmusic" loop><source src="song1.mp3" type="audio/mp3"></audio>
    <script>
        document.getElementById("start").addEventListener("click", () => {
            document.getElementById("bgmusic").play().catch(e => {});
            document.getElementById("intro").style.display = "none";
            document.getElementById("main").style.display = "block";
        });
    </script>
</body>
</html>
